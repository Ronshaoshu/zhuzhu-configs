name: drl_env
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10  # Recommended for stable-baselines3/gymnasium compatibility
  - numpy>=1.24.0
  - matplotlib>=3.7.0
  - pytorch>=2.0.0
  - cpuonly  # Change to 'pytorch-cuda=11.8' (or your version) if using an NVIDIA GPU
  - pip
  - pip:
    - gymnasium>=0.29.0
    - stable-baselines3>=2.3.0
    - prometheus-api-client>=0.5.3
    - pytest>=7.4.0
    - tensorboard>=2.14.0
